name: Windows Release

on:
  push:
    branches:
      - master
    tags:
      - "v*-windows-x64*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update"
        required: true
        default: "windows-x64-latest"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and upload Windows x64 package
    runs-on: windows-2022
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build renderer
        run: npm run build

      - name: Build Windows package
        run: npx electron-builder --win --x64 --publish never

      - name: Upload package to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
        run: |
          $ErrorActionPreference = 'Stop'
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $package.version
          $productName = $package.build.productName
          $releaseTag = "windows-x64-latest"
          $env:RELEASE_TAG = if ($env:RELEASE_TAG_INPUT) { $env:RELEASE_TAG_INPUT } else { $releaseTag }
          $outputDir = Resolve-Path '..\game-design-tools-windows-x64'
          $files = @(
            Join-Path $outputDir "$productName-$version-x64-setup.exe"
            Join-Path $outputDir "$productName-$version-x64-portable.exe"
            Join-Path $outputDir "$productName-$version-x64-win.zip"
            Join-Path $outputDir "$productName-$version-x64-setup.exe.blockmap"
            Join-Path $outputDir 'latest.yml'
          )

          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing release artifact: $file"
            }
          }

          $notes = @"
          Windows 10/11 x64 desktop package.

          Artifacts:
          - setup exe: installer with Start Menu and desktop shortcut options
          - portable exe: portable app
          - win zip: unpacked desktop app archive
          "@

          if (gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>$null) {
            gh release upload $env:RELEASE_TAG @files --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:RELEASE_TAG @files --repo $env:GITHUB_REPOSITORY --title "Game Design Tools $env:RELEASE_TAG" --notes $notes
          }
